<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Institution Register | UniGrade</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="nav-container">
    <a href="index.html" class="logo">🎓 UniGrade</a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="institution-login.html">Institution Login</a>
      <a href="faculty-login.html">Faculty Login</a>
    </div>
  </div>
</nav>

<div class="home-container">
  <div class="login-card fade-up" style="max-width:520px;">
    <div class="login-header">
      <div class="login-icon">🏛️</div>
      <h1>Register Institution</h1>
      <p>Create an institution account to manage batch grades and analytics.</p>
    </div>

    <div id="regAlert" style="display:none;"></div>

    <label>Institution Name *</label>
    <input type="text" id="regName" placeholder="e.g. ABC University" onkeydown="if(event.key==='Enter') institutionRegister()">

    <label>Admin Email *</label>
    <input type="email" id="regEmail" placeholder="admin@university.edu" onkeydown="if(event.key==='Enter') institutionRegister()">

    <label>City / Location</label>
    <input type="text" id="regCity" placeholder="e.g. Mumbai" onkeydown="if(event.key==='Enter') institutionRegister()">

    <label>Password * <span style="color:#94a3b8;font-size:11px;font-weight:400;">(min 6 characters)</span></label>
    <input type="password" id="regPassword" placeholder="Create a strong password" onkeydown="if(event.key==='Enter') institutionRegister()">

    <label>Confirm Password *</label>
    <input type="password" id="regConfirm" placeholder="Repeat your password" onkeydown="if(event.key==='Enter') institutionRegister()">

    <button onclick="institutionRegister()">Register Institution →</button>

    <p class="login-footer-text">Already registered? <a href="institution-login.html">Login here</a></p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
