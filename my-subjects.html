<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Subjects | UniGrade</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">🎓 UniGrade</a>
            <div class="nav-links">
                <a href="faculty-dashboard.html">← Dashboard</a>
                <a href="upload-excel.html">Upload Marks</a>
                <a href="faculty-login.html" onclick="localStorage.removeItem('facultyEmail')" style="color:#dc2626;">Logout</a>
            </div>
        </div>
    </nav>

    <div class="page-wrapper">
        <div style="margin-bottom:36px;" class="fade-up">
            <p style="font-size:13px;color:var(--text-muted);font-weight:600;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:8px;">Faculty Portal</p>
            <h1 style="font-size:40px;font-weight:800;color:var(--primary);letter-spacing:-1px;margin-bottom:8px;">My Subjects</h1>
            <p style="color:var(--text-muted);font-size:16px;">Subjects and batches derived from your uploaded records.</p>
        </div>

        <div id="subjectsContainer" class="fade-up delay-1"></div>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const records = JSON.parse(localStorage.getItem('uploadedRecords') || '[]');

            if (records.length === 0) {
                document.getElementById('subjectsContainer').innerHTML = `
                    <div class="empty-state" style="background:var(--surface);border-radius:var(--radius-lg);border:1px solid rgba(255,255,255,0.5);">
                        <div class="empty-icon">📚</div>
                        <h3>No subjects yet</h3>
                        <p>Upload marks for a subject to see it here.</p>
                        <button onclick="window.location.href='upload-excel.html'" style="margin-top:20px;width:auto;padding:12px 28px;">Upload Marks →</button>
                    </div>`;
                return;
            }

            // Group by subject
            const subjectMap = {};
            records.forEach(r => {
                if (!subjectMap[r.subject]) {
                    subjectMap[r.subject] = { code: r.subjectCode || '—', batches: new Set(), students: new Set(), marks: [], semester: r.semester || '—', year: r.academicYear || '—' };
                }
                subjectMap[r.subject].batches.add(r.batch);
                subjectMap[r.subject].students.add(r.rollNo);
                subjectMap[r.subject].marks.push(Number(r.marks) || 0);
            });

            let html = `<div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:24px;">`;

            Object.entries(subjectMap).forEach(([subject, data]) => {
                const avg = data.marks.length ? (data.marks.reduce((a, b) => a + b, 0) / data.marks.length).toFixed(1) : '—';
                const highest =
                data.marks.length > 0
                ? Math.max(...data.marks)
                : 0;

                const lowest =
                data.marks.length > 0
                ? Math.min(...data.marks)
                : 0;
                const pct = avg !== '—' ? ((avg / 100) * 100).toFixed(0) : 50;

                html += `
                    <div class="card" style="cursor:default;">
                        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;">
                            <div>
                                <h3 style="color:var(--primary);font-size:17px;font-weight:700;margin-bottom:4px;">${subject}</h3>
                                <span class="badge badge-blue">${data.code}</span>
                            </div>
                            <span class="badge badge-green">Active</span>
                        </div>
                        <ul class="subjects-list">
                            ${data.semester !== '—'
                            ? `<li>Semester <span>${data.semester}</span></li>`
                            : ''}

                            ${data.year !== '—'
                            ? `<li>Academic Year <span>${data.year}</span></li>`
                            : ''}
                            <li>Batches <span>${[...data.batches].join(', ')}</span></li>
                            <li>Total Students <span>${data.students.size}</span></li>
                            <li>Class Average <span>${avg}</span></li>
                            <li>Highest Marks <span>${highest}</span></li>
                            <li>Lowest Marks <span>${lowest}</span></li>
                        </ul>
                        <div style="margin-top:16px;">
                            <div style="display:flex;justify-content:space-between;font-size:12.5px;color:var(--text-muted);margin-bottom:6px;">
                                <span>Class Performance</span>
                                <span>${pct}%</span>
                            </div>
                            <div class="progress-bar-wrap">
                                <div class="progress-bar-fill" style="width:${pct}%"></div>
                            </div>
                        </div>
                        <button onclick="window.location.href='student-records.html'" style="width:100%;margin-top:20px;padding:11px;font-size:14px;">View Records →</button>
                    </div>`;
            });

            html += `</div>`;
            document.getElementById('subjectsContainer').innerHTML = html;
        });
    </script>
</body>
</html>
